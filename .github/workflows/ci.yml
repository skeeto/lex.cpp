name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  linux:
    name: Linux ${{ matrix.compiler }} (${{ matrix.compress }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        compress: ["", "-Cfe", "-f"]
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y flex llvm gcovr
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            sudo apt-get install -y clang clang-tools libclang-rt-18-dev
          fi
      - name: Configure
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            CC=clang CXX=clang++ cmake -S . -B build \
              -DCMAKE_BUILD_TYPE=Debug \
              -DLEXCPP_LEX_READY=ON -DLEXCPP_WERROR=ON \
              -DLEXCPP_TEST_COMPRESS=${{ matrix.compress }}
          else
            cmake -S . -B build \
              -DCMAKE_BUILD_TYPE=Debug \
              -DLEXCPP_LEX_READY=ON -DLEXCPP_WERROR=ON \
              -DLEXCPP_TEST_COMPRESS=${{ matrix.compress }}
          fi
      - name: Build
        run: cmake --build build -j
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Install dry-run
        run: |
          DESTDIR=/tmp/inst cmake --install build --prefix /usr/local
          test -x /tmp/inst/usr/local/bin/lex
          test -f /tmp/inst/usr/local/lib/liblex.a
          test -f /tmp/inst/usr/local/lib/pkgconfig/lex.pc
          PKG_CONFIG_PATH=/tmp/inst/usr/local/lib/pkgconfig \
              pkg-config --libs lex

  sanitizers:
    name: ASan+UBSan (clang)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y flex clang clang-tools libclang-rt-18-dev
      - name: Configure
        run: |
          CC=clang CXX=clang++ cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DLEXCPP_LEX_READY=ON -DLEXCPP_SANITIZE=ON
      - run: cmake --build build -j
      - run: ctest --test-dir build --output-on-failure

  coverage:
    name: Coverage (clang)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y flex clang llvm libclang-rt-18-dev
      - name: Configure
        run: |
          CC=clang CXX=clang++ cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DLEXCPP_LEX_READY=ON -DLEXCPP_COVERAGE=ON
      - run: cmake --build build -j
      - run: cmake --build build --target coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: build/coverage/html

  fuzz-smoke:
    name: Fuzz smoke (clang)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y flex clang clang-tools libclang-rt-18-dev
      - name: Configure
        run: |
          CC=clang CXX=clang++ cmake -S . -B build-fuzz \
            -DCMAKE_BUILD_TYPE=Debug \
            -DLEXCPP_BUILD_FUZZ=ON -DLEXCPP_BUILD_TESTS=OFF
      - run: cmake --build build-fuzz -j
      - run: ./build-fuzz/fuzz/fuzz_regex   -max_total_time=30
      - run: ./build-fuzz/fuzz/fuzz_lfile   -max_total_time=30
      - run: ./build-fuzz/fuzz/fuzz_runtime -max_total_time=30

  reentrant-only:
    name: Reentrant smoke (clang)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          sudo apt-get update
          sudo apt-get install -y flex clang clang-tools libclang-rt-18-dev
      - name: Configure
        run: |
          CC=clang CXX=clang++ cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug -DLEXCPP_LEX_READY=ON
      - run: cmake --build build -j
      - name: Run reentrant tests
        run: ctest --test-dir build -R '16[0-5]_' --output-on-failure
      - name: Run header-file tests
        run: ctest --test-dir build -R 'header' --output-on-failure || true

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install flex
        run: brew install flex
      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DLEXCPP_LEX_READY=ON
      - run: cmake --build build -j
      - run: ctest --test-dir build --output-on-failure

  mingw-wine:
    name: MinGW cross-build + wine smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mingw + wine
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 wine64 wine flex
      - name: Cross-build lex.exe
        run: |
          cmake -S . -B build-mingw \
            -DCMAKE_TOOLCHAIN_FILE=cmake/MinGW-x86_64.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DLEXCPP_BUILD_TESTS=OFF
          cmake --build build-mingw -j
      - name: Native build for parity reference
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DLEXCPP_BUILD_TESTS=OFF
          cmake --build build -j
      - name: "Smoke 1 (codegen parity: wine output == native output)"
        run: |
          fail=0
          for d in tests/cases/*/; do
            case=$(basename $d)
            WINEDEBUG=-all wine build-mingw/bin/lex.exe -t $d/scanner.l 2>/dev/null > /tmp/w.c
            build/bin/lex -t $d/scanner.l 2>/dev/null > /tmp/n.c
            if ! cmp -s /tmp/w.c /tmp/n.c; then
              fail=$((fail+1))
              [ $fail -le 3 ] && diff /tmp/w.c /tmp/n.c | head -20
              echo "DIFFER: $case"
            fi
          done
          echo "Codegen-parity failures: $fail"
          test $fail -eq 0
      - name: "Smoke 2 (mingw-built scanner under wine vs flex)"
        run: |
          fail=0
          for case in 010_minimal 080_longest 100_echo 160_reentrant_basic \
                      230_reject_simple 240_yymore_basic 290_trail_var; do
              d=tests/cases/$case
              [ -f $d/scanner.l ] || continue
              WINEDEBUG=-all wine build-mingw/bin/lex.exe -o /tmp/w.c $d/scanner.l
              x86_64-w64-mingw32-gcc -w -O0 /tmp/w.c -o /tmp/w.exe \
                  -static -static-libgcc -static-libstdc++
              flex -o /tmp/f.c $d/scanner.l
              cc -w -Wno-error=implicit-function-declaration /tmp/f.c -o /tmp/f
              input=/dev/null
              [ -f $d/input.txt ] && input=$d/input.txt
              WINEDEBUG=-all wine /tmp/w.exe < $input > /tmp/wout 2>/dev/null
              /tmp/f < $input > /tmp/fout
              if ! cmp -s /tmp/wout /tmp/fout; then
                  echo "DIFFER (runtime): $case"
                  diff <(od -c /tmp/wout | head -5) <(od -c /tmp/fout | head -5)
                  fail=$((fail+1))
              fi
          done
          echo "Runtime-parity failures: $fail"
          test $fail -eq 0

  windows:
    name: Windows MSVC
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      # No flex on Windows runner by default; build only (LEXCPP_LEX_READY=OFF
      # short-circuits inside tests/CMakeLists.txt when flex is not found).
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - run: cmake --build build --config Release -j
      - name: Smoke
        run: |
          .\build\bin\Release\lex.exe --version
          .\build\bin\Release\lex.exe --help
